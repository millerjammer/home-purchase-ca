<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>CA Home Purchase Optimizer</title><link rel="stylesheet" href="./src/dark.css"></head><body><div class="container"><h1>CA Home Purchase Optimizer</h1><label>Purchase Price: $<span id="priceDisplay">2,800,000</span></label> <input type="range" id="price" min="1000000" max="4000000" step="10000" value="2800000"> <label>Max % Income for Housing Cost: <span id="targetDisplay">40%</span></label> <input type="range" id="target" min="10" max="60" step="1" value="40"><div><label>Prop 19 Base Home Price ($):</label> <input type="number" id="oldHomePrice" value="1900000"></div><div><label>Available Securities ($):</label> <input type="number" id="securities" value="2000000"></div><div><label>Securities Loan Rate (%):</label> <input type="number" id="sblRate" value="6"></div><div><label>Mortgage Rate (%):</label> <input type="number" id="mortgageRate" value="6"></div><div><label>Portfolio Growth Rate (%):</label> <input type="number" id="returnRate" value="10"></div><div><label>Annual Income ($):</label> <input type="number" id="income" value="195000"></div><h2>Results</h2><div>Optimal Mortgage: $<span id="mortgage"></span></div><div>Optimal Securities Loan: $<span id="sbl"></span></div><div>Monthly Housing Cost: $<span id="monthly"></span> (<span id="percent"></span>% of income)</div><canvas id="arbitrageChart" width="800" height="400"></canvas><script type="module" src="./index.js"></script></div><script defer="defer" src="bundle.js"></script></body></html>
