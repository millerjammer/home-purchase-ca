<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SBL Portfolio Model</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="p-4 bg-dark text-white">

    <div class="container">

        <h3 class="mb-4">Home Purchase Using Securities Based Loan</h3>

        <div class="row">

            <!-- Inputs (Left Column) -->
            <div class="col-md-6">
                <div class="card p-3 mb-3 bg-secondary">

                    <div class="mb-3">
                        <label>Home Purchase Price</label>
                        <input type="range" id="homePrice" min="200000" max="5000000" step="50000">
                        <div>$<span id="homePriceValue"></span></div>
                    </div>

                    <div class="mb-3">
                        <label>Portfolio Value</label>
                        <input class="form-control" id="portfolioValue" value="3000000">
                    </div>

                    <div class="mb-3">
                        <label>Growth Rate (%)</label>
                        <input class="form-control" id="growthRate" value="7">
                    </div>

                    <div class="mb-3">
                        <label>SBL Interest Rate (%)</label>
                        <input class="form-control" id="sblRate" value="5">
                    </div>

                    <div class="mb-3">
                        <label>SBL Fraction (%)</label>
                        <input type="range" id="sblFraction" min="0" max="100" step="5">
                        <span id="sblFractionValue"></span>%
                    </div>

                    <div class="mb-3">
                        <label>Mortgage Interest Rate (%)</label>
                        <input class="form-control" id="mortgageRate" value="6">
                    </div>

                    <div class="mb-3">
                        <label>Property Tax Rate (%)</label>
                        <input class="form-control" id="propertyTaxRate" value="1.25">
                    </div>

                </div>
            </div>

            <!-- Outputs (Right Column) -->
            <div class="col-md-6">
                <div class="card p-3 mb-3 bg-secondary">
                    <h5>Mortgage & Monthly Cash Flow</h5>
                    <table class="table table-dark table-striped">
                        <tbody id="monthlyBreakout"></tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Charts Below -->
        <div class="card p-3 bg-secondary">
            <canvas id="chart"></canvas>
        </div>

    </div>

</body>

</html>
