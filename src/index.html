<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>CA Home Purchase Calculator</title>

    <style>
        body {
            background: #111;
            padding: 40px;
        }

        .chart-container {
            height: 420px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2 class="mb-4">California Home Purchase Calculator</h2>

        <div class="row">

            <div class="col-lg-4">

                <div class="mb-3">
                    <label class="form-label">Home Price</label>
                    <input id="homePrice" class="form-control" type="number" value="2000000">
                    <input id="homePriceSlider" class="form-range" type="range" min="1000000" max="4000000" step="50000"
                        value="2000000">
                </div>

                <div class="mb-3">
                    <label class="form-label">Securities Value</label>
                    <input id="securitiesValue" class="form-control" type="number" value="3000000">
                </div>

                <div class="mb-3">
                    <label class="form-label">Securities Growth %</label>
                    <input id="securitiesGrowth" class="form-control" type="number" step="0.1" value="7">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mortgage Rate %</label>
                    <input id="mortgageRate" class="form-control" type="number" step="0.1" value="6.5">
                </div>

                <div class="mb-3">
                    <label class="form-label">Income</label>
                    <input id="income" class="form-control" type="number" value="500000">
                </div>

                <div class="mb-3">
                    <label class="form-label">% Income to Housing</label>
                    <input id="incomePercent" class="form-range" min="5" max="60" value="30">
                    <span id="incomePercentLabel">30%</span>
                </div>

                <div class="card mt-4">
                    <div class="card-body">

                        <h5>Results</h5>

                        <div id="sblAmount"></div>
                        <div id="mortgageAmount"></div>
                        <div id="monthlyPayment"></div>
                        <div id="taxDeduction"></div>

                    </div>
                </div>

            </div>

            <div class="col-lg-8">

                <div class="chart-container">
                    <canvas id="securitiesChart"></canvas>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
