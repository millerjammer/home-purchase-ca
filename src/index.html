<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>SBL Portfolio Model</title>
</head>

<body class="p-4">

<div class="container">

<h3 class="mb-4">Home Purchase Using Securities Based Loan</h3>

<div class="card p-3 mb-4">

<div class="mb-3">
<label>Home Purchase Price</label>
<input type="range" id="homePrice" min="200000" max="5000000" step="50000">
<div>$<span id="homePriceValue"></span></div>
</div>

<div class="mb-3">
<label>Portfolio Value</label>
<input class="form-control" id="portfolioValue" value="3000000">
</div>

<div class="mb-3">
<label>Growth Rate (%)</label>
<input class="form-control" id="growthRate" value="7">
</div>

<div class="mb-3">
<label>SBL Interest Rate (%)</label>
<input class="form-control" id="sblRate" value="5">
</div>

</div>

<canvas id="chart"></canvas>

</div>

</body>
</html>
